<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Digital Clock & Stopwatch</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Animated Background -->
    <div class="background">

        <div class="circle one"></div>
        <div class="circle two"></div>
        <div class="circle three"></div>

    </div>

    <!-- Main Container -->
    <div class="container">

        <!-- Top Image -->
        <div class="image-box">

          <img 
    src="https://cdn-icons-png.flaticon.com/512/992/992700.png" 
    alt="Clock Image">


        </div>

        <!-- Heading -->
        <h1>Digital Clock</h1>

        <!-- Clock -->
        <div class="clock-box">

            <div id="clock">
                00:00:00
            </div>

            <div id="date">
                Loading...
            </div>

        </div>

        <!-- Stopwatch -->
        <div class="stopwatch-container">

            <h2>Stopwatch</h2>

            <div id="stopwatch">
                00:00:00
            </div>

            <!-- Buttons -->
            <div class="buttons">

                <button id="startBtn">
                    Start
                </button>

                <button id="pauseBtn">
                    Pause
                </button>

                <button id="resetBtn">
                    Reset
                </button>

            </div>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
